<div class="docs-layout">
  <nav class="docs-sidebar">
    <div class="sidebar-label">Documentation</div>
    <a
      *ngFor="let page of pages"
      [routerLink]="['/docs', page.slug]"
      class="sidebar-link"
      [class.active-link]="page.slug === currentSlug"
    >{{ page.title }}</a>
    <p *ngIf="pages.length === 0" class="empty-state" style="text-align:left;padding:0.5rem 0.7rem;">
      No pages found.
    </p>
  </nav>

  <div class="docs-main">
    <div *ngIf="loading" class="loading">
      <span class="spinner"></span> Loading…
    </div>
    <div *ngIf="error" class="alert alert-error">{{ error }}</div>
    <div
      *ngIf="!loading && !error && renderedHtml"
      id="doc-render"
      class="markdown-body"
      [innerHTML]="renderedHtml"
    ></div>
    <p *ngIf="!loading && !error && !renderedHtml" class="empty-state">
      Select a page from the sidebar.
    </p>
  </div>
</div>
