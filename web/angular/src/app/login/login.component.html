<div class="main-content" style="max-width: 400px">
  <h1 class="page-title">Sign In</h1>
  <mat-card class="section-card">
    <mat-card-content>
      <p>Enter the admin password to access configuration.</p>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" [(ngModel)]="password" (keyup.enter)="submit()" />
      </mat-form-field>
      @if (error) {
        <div class="feedback-message feedback-error">{{ error }}</div>
      }
    </mat-card-content>
    <mat-card-actions>
      <button mat-flat-button color="primary" (click)="submit()" [disabled]="loading || !password">
        Sign In
      </button>
    </mat-card-actions>
  </mat-card>
</div>
