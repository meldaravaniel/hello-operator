<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Hello Operator{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/">&#9742; Hello Operator</a>
    <div class="d-flex gap-2">
      <a href="/" class="btn btn-sm {% if request.path == '/' %}btn-light{% else %}btn-outline-light{% endif %}">Status</a>
      <a href="/docs" class="btn btn-sm {% if request.path.startswith('/docs') %}btn-light{% else %}btn-outline-light{% endif %}">Docs</a>
      <a href="/config" class="btn btn-sm {% if request.path.startswith('/config') %}btn-light{% else %}btn-outline-light{% endif %}">Configure</a>
    </div>
  </nav>

  <div class="container-xl py-4">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFCpBNGMGSCSLqnD4EXQz40F6e/"
          crossorigin="anonymous"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
