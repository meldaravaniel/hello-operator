name: Build Raspberry Pi Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # needed to publish release assets

jobs:
  build-image:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image
        id: build
        uses: pguyot/arm-runner-action@v2
        with:
          base_image: https://downloads.raspberrypi.com/raspios_lite_arm64_latest
          image_additional_mb: 2048
          copy_repository_path: /opt/hello-operator
          commands: bash /opt/hello-operator/scripts/build-image-chroot.sh

      - name: Rename and compress image
        run: |
          IMAGE="${{ steps.build.outputs.image }}"
          TAG="${GITHUB_REF_NAME:-dev}"
          FINAL="hello-operator-${TAG}.img"
          mv "$IMAGE" "$FINAL"
          xz -6 --threads=0 "$FINAL"
          echo "image_xz=${FINAL}.xz" >> "$GITHUB_ENV"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-operator-pi-image
          path: '*.img.xz'
          retention-days: 30

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.img.xz'
